<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess Game</title>
    <link rel="stylesheet" href="styles.css" ></link>
</head>
<body>

    <div class="container">
        <h1>Guessing Game</h1>
        <p>Pick a number between 1 to 10</p>
        
        <input type="number" id="userGuess" placeholder="0">
        <button id="submitBtn">Check Guess</button>

        <p id="feedback"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
