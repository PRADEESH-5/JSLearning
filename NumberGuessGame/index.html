<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess Game</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 60px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #feedback { margin-top: 20px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Guessing Game</h1>
        <p>Pick a number between **1** and **10**</p>
        
        <input type="number" id="userGuess" placeholder="0">
        <button id="submitBtn">Check Guess</button>

        <p id="feedback"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
